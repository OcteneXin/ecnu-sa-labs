name: Test PDF

on: push

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker://pandoc/extra:3-ubuntu
        with:
          args: >-  # break string of arguments into multiple lines
            lab_manual_cn/lab1.md --output=output/result.pdf --pdf-engine=xelatex
            --template .github/template/eisvogel.latex
            --shift-heading-level-by=-1
            --toc-depth=2
            --number-sections
            --reference-links
            --reference-location=section
      - uses: actions/upload-artifact@v4
        with:
          name: output
          path: output